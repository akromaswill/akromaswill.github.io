<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>

/* =========================
   🟣 FULL BACKGROUND (SAFE)
========================= */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: calc(var(--vh, 1vh) * 100);
  background: linear-gradient(180deg, #3a0f40, #6a2a72, #8a3a9a);
  overflow-x: hidden;
}

/* 🔥 iOS FULLSCREEN FIX (this is the key) */
body {
  min-height: 100vh;
  min-height: 100dvh;
  min-height: -webkit-fill-available; /* iOS Safari fullscreen fix */
}

/* 🔥 force background to cover any 1–2px gaps */
body::before {
  content: "";
  position: fixed;
  inset: -2px;
  background: linear-gradient(180deg, #3a0f40, #6a2a72, #8a3a9a);
  z-index: -1;
}

/* =========================
   ⚡ FLASH
========================= */
#flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 999;
  filter: blur(8px);
}

#flash.active {
  animation: flashAnim 1.8s ease-out;
}

@keyframes flashAnim {
  0% {
    opacity: 0;
  }
  15% {
    opacity: 1;
  }
  40% {
    opacity: 0.95;
  }
  70% {
    opacity: 0.6;
  }
  100% {
    opacity: 0;
  }
}

/* =========================
   🧱 LAYOUT
========================= */
.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(var(--vh, 1vh) * 100); /* full visible viewport height */
  text-align: center;
  padding: 20px;
}

.home {
  min-height: calc(var(--vh, 1vh) * 100);
}
   
#main {
  display: flex;               /* make it a flex container */
  flex-direction: column;      /* stack items vertically */
  justify-content: center;     /* vertical centering */
  align-items: center;         /* horizontal centering */
  min-height: calc(var(--vh, 1vh) * 100); /* full viewport height */
  opacity: 0;
  transform: scale(1.05);
  transition: opacity 1.2s ease, transform 1.2s ease;
}

/* =========================
   🌌 IMAGE
========================= */
img {
  width: 80%;
  max-width: 400px;
  margin-bottom: 20px;
}

/* =========================
   💗 ENTER
========================= */
.enter {
  font-size: 22px;
  color: #ff9ae6;
  text-decoration: underline;
  cursor: pointer;
  animation: glow 2s infinite;
}

   .enter:hover {
  transform: scale(1.1);
}

@keyframes glow {
  0% { opacity: 0.6; }
  50% { opacity: 1; text-shadow: 0 0 20px #ff66cc; }
  100% { opacity: 0.6; }
}

/* =========================
   ⭐ STARS
========================= */
.stars {
  position: fixed;
  top: 0;
  width: 40px;
  height: 100vh;
  overflow: hidden;
  font-size: 26px;
  line-height: 32px;
}

.left { left: 0; }
.right { right: 0; }

/* =========================
   🧿 TEXT
========================= */
h1 {
  color: black;
  font-weight: bold;
  margin: 10px 0;
}

.symbol {
  font-size: 24px;
  color: #ff9ae6;
  margin: 20px 0;
}

p {
  text-align: center;
  line-height: 1.6;
}

</style>
</head>

<body>

<!-- ⚡ FLASH -->
<div id="flash"></div>

<!-- ⭐ STARS -->
<div id="stars" style="display:none;">
  <div class="stars left">
    ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
    ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
    ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
  </div>

  <div class="stars right">
    ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
    ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
    ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
  </div>
</div>

<!-- 🌌 ENTRY -->
<div id="landing" class="center">
  <img src="IMG_7113.png">
  <div class="enter" onclick="enter()">enter heaven</div>
</div>

<!-- 🌐 HOME -->
<div id="main" class="home" style="display:none;">
  <h1>Jerome Rafael</h1>
  <div class="symbol">ॐ</div>

  <p>
    KEEP CALM<br>
    AND<br>
    THE LIGHT<br>
    WILL PREVAIL
  </p>
</div>

<script>
function enter() {
  const flash = document.getElementById("flash");
  const landing = document.getElementById("landing");
  const main = document.getElementById("main");
  const stars = document.getElementById("stars");

  flash.classList.add("active");

setTimeout(() => {
  // switch while screen is still bright
  landing.style.display = "none";
  main.style.display = "block";
  stars.style.display = "block";

  // fade in main content
  setTimeout(() => {
    main.style.opacity = "1";
main.style.transform = "scale(1)";
  }, 50);

}, 400); // 👈 happens early during flash

// let flash finish naturally
setTimeout(() => {
  flash.classList.remove("active");
}, 1400);
}
   // Mobile full screen height fix for iOS
function setFullHeight() {
  const vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', `${vh}px`);
}

// Run once
setFullHeight();

// Update on resize/orientation change
window.addEventListener('resize', setFullHeight);
   
</script>
