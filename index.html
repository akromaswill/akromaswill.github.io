<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Enter Heaven</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: linear-gradient(#2a0a2f, #4a1b4f);
      font-family: "Courier New", monospace;
      color: #f5f5f5;
      text-align: center;
      overflow-x: hidden;
    }

    /* removes weird white bars on mobile */
    body {
      min-height: 100vh;
      background-attachment: fixed;
    }

    .hidden {
      display: none;
    }

    /* 🌌 landing positioning (moves content down ~1.5cm) */
    .landing-wrap {
      padding-top: 60px;
    }

    .section {
      margin: 40px 20px;
    }

    img {
      max-width: 90%;
      border-radius: 6px;
    }

    /* ✨ blinking enter text */
    .blink {
      font-size: 1.6em;
      color: #ff7ad9;
      text-decoration: underline;
      cursor: pointer;
      animation: blinkAnim 1s infinite;
    }

    @keyframes blinkAnim {
      50% { opacity: 0; }
    }

    .symbol {
      color: #ff7ad9;
      font-size: 1.5em;
      margin: 20px;
    }

    /* 🌟 HEAVEN FLASH EFFECT */
    .flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.2s ease;
    }

    .flash.active {
      opacity: 1;
    }
  </style>
</head>

<body>

<!-- 🌟 flash overlay -->
<div id="flash" class="flash"></div>

<!-- 🌌 LANDING -->
<div id="landing" class="landing-wrap">

  <div class="section">
    <img src="IMG_7113.png">
  </div>

  <div class="section">
    <div class="blink" onclick="enterHeaven()">
      enter heaven
    </div>
  </div>

</div>

<!-- 🌐 MAIN SITE -->
<div id="main" class="hidden">

  <h1>Your Artist Name</h1>

  <div class="symbol">★ ॐ ★</div>

  <div class="section">
    <p>Visual artist exploring color, nature, and spirituality.</p>
  </div>

  <div class="section">
    <h2>Selected Work</h2>
    <div class="gallery">
      <img src="https://via.placeholder.com/300">
      <img src="https://via.placeholder.com/300">
    </div>
  </div>

</div>

<script>
  function enterHeaven() {

    // 🌟 flash ON
    const flash = document.getElementById("flash");
    flash.classList.add("active");

    setTimeout(() => {
      flash.classList.remove("active");
    }, 1200);

    // ⏳ switch page after flash
    setTimeout(() => {
      document.getElementById("landing").style.display = "none";
      document.getElementById("main").style.display = "block";
    }, 1200);
  }
</script>

</body>
</html>
