<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* 🟣 BACKGROUND */
body {
  margin: 0;
  font-family: monospace;
  background: linear-gradient(#4a1a52, #6a2a72);
  color: white;
  text-align: center;
}

/* 🧱 CENTER */
.center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 🌌 IMAGE */
img {
  width: 80%;
  max-width: 400px;
  margin-bottom: 20px;
}

/* 💗 BUTTON */
button {
  font-size: 20px;
  background: none;
  border: none;
  color: #ff9ae6;
  text-decoration: underline;
}

/* 🌟 STARS */
.stars {
  position: fixed;
  top: 0;
  width: 30px;
  height: 100vh;
  overflow: hidden;
}

.stars div {
  animation: move 5s linear infinite;
}

@keyframes move {
  from { transform: translateY(0); }
  to { transform: translateY(-50%); }
}

.left { left: 0; }
.right { right: 0; }

/* 🌌 TITLE */
h1 {
  color: black;
}

/* 🧿 SYMBOL */
.symbol {
  font-size: 24px;
  color: #ff9ae6;
}
</style>
</head>

<body>

<!-- ⭐ STARS -->
<div id="stars" style="display:none;">
  <div class="stars left">
    <div>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★</div>
  </div>
  <div class="stars right">
    <div>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★</div>
  </div>
</div>

<!-- 🌌 ENTRY -->
<div id="landing" class="center">
  <img src="IMG_7113.png">
  <button onclick="enter()">enter heaven</button>
</div>

<!-- 🌐 HOME -->
<div id="main" class="center" style="display:none;">
  <h1>Jerome Rafael</h1>
  <div class="symbol">ॐ</div>
  <p>Visual artist exploring color, nature, spirituality.</p>
</div>

<script>
function enter() {
  document.getElementById("landing").style.display = "none";
  document.getElementById("main").style.display = "flex";
  document.getElementById("stars").style.display = "block";
}
</script>

</body>
</html>
