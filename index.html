<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>Enter Heaven</title>

  <style>
    /* 🟣 FULLSCREEN FIX (this removes white bars completely) */
    html {
      height: 100%;
      background: #3a0f3f;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      min-height: 100dvh; /* modern mobile fix */
      width: 100%;
      font-family: "Courier New", monospace;
      text-align: center;
      color: #f5f5f5;
      overflow-x: hidden;

      background: linear-gradient(180deg, #3a0f3f, #5a2360);

      /* IMPORTANT: prevents white overscroll bars */
      overscroll-behavior: none;
    }

    .hidden {
      display: none;
    }

    .landing-wrap {
      padding-top: 90px;
    }

    .section {
      margin: 40px 20px;
    }

    img {
      max-width: 90%;
      border-radius: 6px;
    }

    /* 💗 glowing enter */
    .blink {
      font-size: 1.6em;
      color: #ff9ae6;
      text-decoration: underline;
      cursor: pointer;
      animation: pulseGlow 2s infinite ease-in-out;
    }

    @keyframes pulseGlow {
      0% { opacity: 0.6; text-shadow: 0 0 5px #ff66cc; transform: scale(1); }
      50% { opacity: 1; text-shadow: 0 0 20px #ff66cc, 0 0 40px #ffb3ec; transform: scale(1.05); }
      100% { opacity: 0.6; text-shadow: 0 0 5px #ff66cc; transform: scale(1); }
    }

    /* 🧿 symbols reveal */
    .symbol {
      color: #ff9ae6;
      font-size: 1.5em;
      margin: 20px;

      opacity: 0;
      transform: translateY(10px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }

    .symbol.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* 🌟 portal */
    .portal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #ffffff 0%, #ffe6ff 30%, transparent 70%);
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.7s ease-in-out;
    }

    .portal.active {
      opacity: 1;
    }

    /* 🔘 CURSOR DOT (desktop only) */
    .cursor-dot {
      position: fixed;
      width: 14px;
      height: 14px;
      background: #ff9ae6;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1000;

      box-shadow:
        0 0 10px #ff66cc,
        0 0 25px #ffb3ec;

      mix-blend-mode: screen;
    }

    /* hide cursor on desktop (optional aesthetic) */
    @media (pointer: fine) {
      body {
        cursor: none;
      }
    }
  </style>
</head>

<body>

<div id="portal" class="portal"></div>

<!-- 🔘 glowing cursor -->
<div id="cursor" class="cursor-dot"></div>

<!-- 🌌 LANDING -->
<div id="landing" class="landing-wrap">

  <div class="section">
    <img src="IMG_7113.png">
  </div>

  <div class="section">
    <div class="blink" onclick="enterHeaven()">
      enter heaven
    </div>
  </div>

</div>

<!-- 🌐 MAIN -->
<div id="main" class="hidden">

  <h1>Your Artist Name</h1>

  <div id="symbol" class="symbol">★ ॐ ★</div>

  <div class="section">
    <p>Visual artist exploring color, nature, and spirituality.</p>
  </div>

</div>

<script>
  function enterHeaven() {

    const portal = document.getElementById("portal");

    portal.classList.add("active");

    setTimeout(() => {
      document.getElementById("landing").style.display = "none";
      document.getElementById("main").style.display = "block";

      setTimeout(() => {
        document.getElementById("symbol").classList.add("show");
      }, 200);

    }, 700);

    setTimeout(() => {
      portal.classList.remove("active");
    }, 1400);
  }

  /* 🔘 cursor follow effect */
  const cursor = document.getElementById("cursor");

  document.addEventListener("mousemove", (e) => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
  });
</script>

</body>
</html>
