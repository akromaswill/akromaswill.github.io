<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>Enter Heaven</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Courier New", monospace;
      text-align: center;
      color: #f5f5f5;
      overflow-x: hidden;
      background: linear-gradient(180deg, #3a0f3f, #5a2360);
      overscroll-behavior: none;
    }

    .hidden { display: none; }

    .landing-wrap { padding-top: 90px; }

    .section { margin: 40px 20px; }

    img { max-width: 90%; border-radius: 6px; }

    /* 💗 ENTER HEAVEN */
    .blink {
      font-size: 1.6em;
      color: #ff9ae6;
      text-decoration: underline;
      cursor: pointer;
      animation: pulseGlow 2s infinite ease-in-out;
    }

    @keyframes pulseGlow {
      0% { opacity: 0.6; text-shadow: 0 0 5px #ff66cc; transform: scale(1); }
      50% { opacity: 1; text-shadow: 0 0 20px #ff66cc, 0 0 40px #ffb3ec; transform: scale(1.05); }
      100% { opacity: 0.6; text-shadow: 0 0 5px #ff66cc; transform: scale(1); }
    }

    /* 🌟 portal */
    .portal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #ffffff 0%, #ffe6ff 30%, transparent 70%);
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.7s ease-in-out;
    }

    .portal.active { opacity: 1; }

    /* ⭐ CURSOR STAR */
    .cursor-star {
      position: fixed;
      font-size: 18px;
      color: #ff9ae6;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1000;
      text-shadow: 0 0 10px #ff66cc, 0 0 25px #ffb3ec;
    }

    /* ✨ trail */
    .trail {
      position: fixed;
      width: 6px;
      height: 6px;
      background: #ffb3ec;
      border-radius: 50%;
      pointer-events: none;
      z-index: 999;
      opacity: 0.8;
      animation: fadeTrail 0.8s forwards;
    }

    @keyframes fadeTrail {
      to {
        opacity: 0;
        transform: scale(0.3);
      }
    }

    /* 🌌 MAIN TITLE */
    h1 {
      font-size: 1.6em;
      margin-top: 20px;
      font-weight: normal;
      letter-spacing: 2px;
    }

    /* 🧿 symbol */
    .symbol {
      color: #ff9ae6;
      font-size: 1.5em;
      margin: 20px;
      opacity: 0;
      transform: translateY(10px);
      transition: 1.2s;
    }

    .symbol.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* 🌟 INFINITE STAR COLUMNS */
    .stars {
      position: fixed;
      top: 0;
      width: 40px;
      height: 200vh; /* key for endless feel */
      overflow: hidden;
      z-index: 5;
      opacity: 0.75;
      pointer-events: none;
    }

    .stars div {
      font-size: 20px; /* ⭐ DOUBLE SIZE */
      line-height: 24px;
      color: #ff9ae6;
      animation: floatStars 12s linear infinite;
      white-space: pre;
    }

    @keyframes floatStars {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }

    .left { left: 4px; }
    .right { right: 4px; }
  </style>
</head>

<body>

<!-- 🌟 portal -->
<div id="portal" class="portal"></div>

<!-- ⭐ cursor -->
<div id="cursor" class="cursor-star">★</div>

<!-- 🌟 INFINITE STAR COLUMNS (ONLY MAIN PAGE) -->
<div id="starsLeft" class="stars left hidden">
  <div>
★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★
  </div>
</div>

<div id="starsRight" class="stars right hidden">
  <div>
★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★
  </div>
</div>

<!-- 🌌 LANDING -->
<div id="landing" class="landing-wrap">

  <div class="section">
    <img src="IMG_7113.png">
  </div>

  <div class="section">
    <div class="blink" onclick="enterHeaven()">enter heaven</div>
  </div>

</div>

<!-- 🌐 MAIN -->
<div id="main" class="hidden">

  <h1>Jerome Rafael</h1>

  <div id="symbol" class="symbol">ॐ</div>

  <div class="section">
    <p>Visual artist exploring color, nature, and spirituality.</p>
  </div>

</div>

<script>
  function enterHeaven() {
    const portal = document.getElementById("portal");

    portal.classList.add("active");

    setTimeout(() => {
      document.getElementById("landing").style.display = "none";
      document.getElementById("main").style.display = "block";

      // ⭐ show stars ONLY after entry
      document.getElementById("starsLeft").classList.remove("hidden");
      document.getElementById("starsRight").classList.remove("hidden");

      setTimeout(() => {
        document.getElementById("symbol").classList.add("show");
      }, 200);

    }, 700);

    setTimeout(() => {
      portal.classList.remove("active");
    }, 1400);
  }

  /* ⭐ cursor + trail */
  const cursor = document.getElementById("cursor");
  let lastTrail = 0;

  document.addEventListener("mousemove", (e) => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";

    const now = Date.now();
    if (now - lastTrail > 40) {
      lastTrail = now;

      const trail = document.createElement("div");
      trail.className = "trail";
      trail.style.left = e.clientX + "px";
      trail.style.top = e.clientY + "px";

      document.body.appendChild(trail);

      setTimeout(() => trail.remove(), 800);
    }
  });
</script>

</body>
</html>
