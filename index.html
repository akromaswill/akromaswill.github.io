<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>

/* 🟣 FORCE FULLSCREEN BACKGROUND */
html {
  background: #4a1a52;
}

body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  min-height: 100dvh;
  font-family: "Courier New", monospace;
  color: white;
  background: linear-gradient(#4a1a52, #6a2a72);
}

/* 🔥 ABSOLUTE BACKGROUND LAYER (kills white bars) */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: linear-gradient(#4a1a52, #6a2a72);
  z-index: -1;
}

/* 🧱 CENTER ENTRY */
.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  /* 🔥 critical fix */
  min-height: 100vh;
  min-height: 100dvh;

  text-align: center;
}

/* ⬆️ HOME */
.home {
  padding-top: 80px;
  text-align: center;
}

/* 🌌 IMAGE */
img {
  width: 80%;
  max-width: 400px;
  margin-bottom: 25px;
}

/* 💗 ENTER */
.enter {
  font-size: 22px;
  color: #ff9ae6;
  text-decoration: underline;
  animation: glow 2s infinite;
}

@keyframes glow {
  0% { opacity: 0.6; }
  50% { opacity: 1; text-shadow: 0 0 20px #ff66cc; }
  100% { opacity: 0.6; }
}

/* ⭐ STARS */
.stars {
  position: fixed;
  top: 0;
  width: 40px;
  height: 100vh;
  overflow: hidden;
}

.stars div {
  font-size: 26px;
  line-height: 32px;
  animation: move 6s linear infinite;
}

@keyframes move {
  from { transform: translateY(0); }
  to { transform: translateY(-50%); }
}

.left { left: 10px; }
.right { right: 10px; }

/* 🌌 TITLE */
h1 {
  color: black;
  font-weight: bold;
}

/* 🧿 SYMBOL */
.symbol {
  font-size: 24px;
  color: #ff9ae6;
  margin: 20px 0;
}

</style>
</head>

<body>

<!-- ⭐ STARS -->
<div id="stars" style="display:none;">
  <div class="stars left">
    <div>
      ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
      ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★
    </div>
  </div>

  <div class="stars right">
    <div>
      ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
      ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★
    </div>
  </div>
</div>

<!-- 🌌 ENTRY -->
<div id="landing" class="center">
  <img src="IMG_7113.png">
  <div class="enter" onclick="enter()">enter heaven</div>
</div>

<!-- 🌐 HOME -->
<div id="main" class="home" style="display:none;">
  <h1>Jerome Rafael</h1>
  <div class="symbol">ॐ</div>
 <p style="text-align:center; line-height:1.6;">
KEEP CALM<br>
AND<br>
THE LIGHT<br>
WILL PREVAIL
</p>

<script>
function enter() {
  document.getElementById("landing").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("stars").style.display = "block";
}
</script>

</body>
</html>
