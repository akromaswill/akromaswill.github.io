<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Your Artist Name</title>

  <style>
    body {
      margin: 0;
      font-family: "Courier New", monospace;
      background: linear-gradient(#1a001f, #330033);
      color: #f5f5f5;
      text-align: center;
    }

    a {
      color: #ff66cc;
      text-decoration: underline;
      font-size: 1.5em;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    .section {
      margin: 60px 20px;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .gallery img {
      width: 280px;
      margin: 10px;
    }

    .symbol {
      color: #ff66cc;
      font-size: 1.5em;
      margin: 20px;
    }
  </style>
</head>

<body>

<!-- 🌌 LANDING PAGE -->
<div id="landing">

  <div class="section">
    <img src="IMG_7113.png" style="max-width:90%;">
  </div>

  <div class="section">
    <a onclick="enterSite()">enter heaven</a>
  </div>

</div>

<!-- 🌐 MAIN SITE -->
<div id="main" class="hidden">

  <h1>Your Artist Name</h1>

  <div class="symbol">★ ॐ ★</div>

  <div class="section">
    <p>Visual artist exploring color, nature, and spirituality.</p>
  </div>

  <div class="section">
    <h2>Selected Work</h2>
    <div class="gallery">
      <img src="https://via.placeholder.com/300">
      <img src="https://via.placeholder.com/300">
      <img src="https://via.placeholder.com/300">
    </div>
  </div>

  <div class="section">
    <h2>About</h2>
    <p>Your bio here.</p>
  </div>

  <div class="section">
    <h2>Contact</h2>
    <p>
      <a href="mailto:your@email.com">Email</a>
    </p>
  </div>

</div>

<script>
  function enterSite() {
    document.getElementById("landing").style.display = "none";
    document.getElementById("main").style.display = "block";
  }
</script>

</body>
</html>
