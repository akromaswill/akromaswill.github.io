<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, height=device-height">

<style>

/* =========================
   🟣 FULL BACKGROUND (SAFE)
========================= */
html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: -webkit-fill-available;
  background: #6a2a72 !important;
  background-color: #6a2a72 !important;
}

body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  background: #6a2a72 !important;
  background-color: #6a2a72 !important;
}
   body {
  min-height: 100dvh;
}

   body.flash {
  animation: flashAnim 1.2s ease-out;
}

   #landing,
#main {
  background: transparent;
}

/* ENSURE ALL MAIN SECTIONS FILL SCREEN */

/* =========================
   ⚡ FLASH
========================= */
#flash {
  position: fixed;
  inset: 0;
  background: #6a2a72;
  opacity: 0;
  pointer-events: none;
  z-index: 999;
  filter: blur(8px);
}

#flash.active {
  animation: flashAnim 1.8s ease-out;
}

@keyframes flashAnim {
  0% {
    opacity: 0;
  }
  15% {
    opacity: 1;
  }
  40% {
    opacity: 0.95;
  }
  70% {
    opacity: 0.6;
  }
  100% {
    opacity: 0;
  }
}

/* =========================
   🧱 LAYOUT
========================= */
.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 20px;
}

.home {
  height: 100%;
}
   
#main {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100%;
  width: 100%;
  opacity: 0;
  transform: scale(1.05);
  transition: opacity 1.2s ease, transform 1.2s ease;
}
   
   #main img {
  display: block;
  margin: 0 auto 20px auto; 
}

/* =========================
   🌌 IMAGE
========================= */
#landing img {
  width: 100%;
  max-width: 320px;
  height: auto;
  display: block;
  margin: 0 auto 20px auto;
}

/* =========================
   💗 ENTER
========================= */
.enter {
  font-size: 22px;
  color: #ff9ae6;
  text-decoration: underline;
  cursor: pointer;
  animation: glow 2s infinite;
}

   .enter:hover {
  transform: scale(1.1);
}

@keyframes glow {
  0% { opacity: 0.6; }
  50% { opacity: 1; text-shadow: 0 0 20px #ff66cc; }
  100% { opacity: 0.6; }
}

/* =========================
   ⭐ STARS
========================= */
#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 5;
  display: none;
}

.stars {
  position: fixed;
  top: 0;
  bottom: 0;
  width: 32px;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  align-items: center;
  font-size: 26px;
  line-height: 1;
  pointer-events: none;
  z-index: 5;
}

.left {
  left: 0;
}
.right {
  right: 0;
}

/* =========================
   🧿 TEXT
========================= */
h1 {
  color: black;
  font-weight: bold;
  margin: 10px 0;
}

.symbol {
  font-size: 24px;
  color: #ff9ae6;
  margin: 20px 0;
}

p {
  text-align: center;
  line-height: 1.6;
}

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: #6a2a72;
}

/* FIXED BACKGROUND */
#bg {
  position: fixed;
  inset: 0;
  background: #6a2a72;
  z-index: -1;
}

/* SCREENS */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  opacity: 0;
  transform: scale(1.03);
  transition: opacity 1s ease, transform 1s ease;

  pointer-events: none;
}

.screen.active {
  opacity: 1;
  transform: scale(1);
  pointer-events: auto;
}

/* ENTER BUTTON */
.enter {
  font-size: 22px;
  color: #ff9ae6;
  text-decoration: underline;
  cursor: pointer;
}
</style>
   
</head>

<body>

<div id="bg"></div>

<div id="landing" class="screen active">
  <img src="IMG_7113.png">
  <div class="enter" onclick="enter()">enter heaven</div>
</div>

<div id="main" class="screen">
  <h1>Jerome Rafael</h1>
  <div class="symbol">ॐ</div>
  <p>
    KEEP CALM<br>
    AND<br>
    THE LIGHT<br>
    WILL PREVAIL
  </p>
</div>
   
<script>
function enter() {
  const landing = document.getElementById("landing");
  const main = document.getElementById("main");

  landing.classList.remove("active");

  setTimeout(() => {
    main.classList.add("active");
  }, 150);
}
</script>
