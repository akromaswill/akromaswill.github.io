<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>Enter Heaven</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      width: 100%;
      font-family: "Courier New", monospace;
      text-align: center;
      color: #f5f5f5;
      overflow-x: hidden;

      background: linear-gradient(180deg, #3a0f3f, #5a2360);
    }

    body {
      min-height: 100vh;
      background-attachment: fixed;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .hidden {
      display: none;
    }

    .landing-wrap {
      padding-top: 90px;
    }

    .section {
      margin: 40px 20px;
    }

    img {
      max-width: 90%;
      border-radius: 6px;
    }

    /* 💗 ENTER HEAVEN glow pulse */
    .blink {
      font-size: 1.6em;
      color: #ff9ae6;
      text-decoration: underline;
      cursor: pointer;

      animation: pulseGlow 2s infinite ease-in-out;
    }

    @keyframes pulseGlow {
      0% {
        opacity: 0.6;
        text-shadow: 0 0 5px #ff66cc;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        text-shadow: 0 0 20px #ff66cc, 0 0 40px #ffb3ec;
        transform: scale(1.05);
      }
      100% {
        opacity: 0.6;
        text-shadow: 0 0 5px #ff66cc;
        transform: scale(1);
      }
    }

    .symbol {
      color: #ff9ae6;
      font-size: 1.5em;
      margin: 20px;

      opacity: 0;
      transform: translateY(10px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }

    .symbol.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* 🌟 portal light */
    .portal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #ffffff 0%, #ffe6ff 30%, transparent 70%);
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.7s ease-in-out;
    }

    .portal.active {
      opacity: 1;
    }
  </style>
</head>

<body>

<div id="portal" class="portal"></div>

<!-- 🌌 LANDING -->
<div id="landing" class="landing-wrap">

  <div class="section">
    <img src="IMG_7113.png">
  </div>

  <div class="section">
    <div class="blink" onclick="enterHeaven()">
      enter heaven
    </div>
  </div>

</div>

<!-- 🌐 MAIN SITE -->
<div id="main" class="hidden">

  <h1>Your Artist Name</h1>

  <div id="symbol" class="symbol">★ ॐ ★</div>

  <div class="section">
    <p>Visual artist exploring color, nature, and spirituality.</p>
  </div>

  <div class="section">
    <h2>Selected Work</h2>
    <div class="gallery">
      <img src="https://via.placeholder.com/300">
      <img src="https://via.placeholder.com/300">
    </div>
  </div>

</div>

<script>
  function enterHeaven() {

    const portal = document.getElementById("portal");

    // 🌟 light transition
    portal.classList.add("active");

    setTimeout(() => {
      document.getElementById("landing").style.display = "none";
      document.getElementById("main").style.display = "block";

      // 🧿 reveal symbols AFTER entry
      setTimeout(() => {
        document.getElementById("symbol").classList.add("show");
      }, 200);

    }, 700);

    setTimeout(() => {
      portal.classList.remove("active");
    }, 1400);
  }
</script>

</body>
</html>
