<!DOCTYPE html>
<html>

    body {

      text-align: center;
    }

    h1 {
      font-size: 2.5em;
      margin-top: 40px;

    .section {

    .gallery {
      display: flex;

    }

    .gallery img {
      width: 280px;
      margin: 10px;
      border-radius: 8px;
      transition: transform 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    a {
      color: #ff4da6;
      text-decoration: none;
    }

    hr {
      border: none;
      height: 1px;
      background: #333;
      margin: 40px 0;

    </p>

  <div class="section">

    <div class="gallery">
      <img src="https://via.placeholder.com/300">
      <img src="https://via.placeholder.com/300">

      Based in Switzerland. My work blends playful color with darker organic and spiritual themes.
