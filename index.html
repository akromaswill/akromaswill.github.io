<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>

/* 🟣 FULL BACKGROUND */
html {
  background: #4a1a52;
}

body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  min-height: 100dvh;
  font-family: "Courier New", monospace;
  color: white;
  background: linear-gradient(#4a1a52, #6a2a72);
}

/* 🔥 FIX WHITE BARS */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: linear-gradient(#4a1a52, #6a2a72);
  z-index: -1;
}

/* ⚡ FLASH OVERLAY */
#flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s ease;
  z-index: 999;
}

#flash.active {
  opacity: 1;
}

/* 🧱 ENTRY CENTER */
.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: 100dvh;
  text-align: center;
}

/* ⬆️ HOME */
.home {
  padding-top: 80px;
  text-align: center;
}

/* 🌌 IMAGE */
img {
  width: 80%;
  max-width: 400px;
  margin-bottom: 25px;
}

/* 💗 ENTER HEAVEN */
.enter {
  font-size: 22px;
  color: #ff9ae6;
  text-decoration: underline;
  animation: glow 2s infinite;
  cursor: pointer;
}

@keyframes glow {
  0% { opacity: 0.6; }
  50% { opacity: 1; text-shadow: 0 0 20px #ff66cc; }
  100% { opacity: 0.6; }
}

/* ⭐ STARS */
.stars {
  position: fixed;
  top: 0;
  width: 40px;
  height: 100vh;
  overflow: hidden;
  font-size: 26px;
  line-height: 32px;
}

/* perfect edge placement */
.left { left: 0px; }
.right { right: 0px; }

/* star alignment */
.stars div {
  text-align: center;
  font-size: 26px;
  line-height: 32px;
}

/* 🌌 TITLE */
h1 {
  color: black;
  font-weight: bold;
}

/* 🧿 SYMBOL */
.symbol {
  font-size: 24px;
  color: #ff9ae6;
  margin: 20px 0;
}

</style>
</head>

<body>

<!-- ⚡ FLASH -->
<div id="flash"></div>

<!-- ⭐ STARS -->
<div id="stars" style="display:none;">
  <div class="stars left">
    ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
    ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
    ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
    ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
  </div>

  <div class="stars right">
    ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
    ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
    ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
    ★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>★<br>
  </div>
</div>

<!-- 🌌 ENTRY -->
<div id="landing" class="center">
  <img src="IMG_7113.png">
  <div class="enter" onclick="enter()">enter heaven</div>
</div>

<!-- 🌐 HOME -->
<div id="main" class="home" style="display:none;">
  <h1>Jerome Rafael</h1>
  <div class="symbol">ॐ</div>

  <p style="text-align:center; line-height:1.6;">
    KEEP CALM<br>
    AND<br>
    THE LIGHT<br>
    WILL PREVAIL
  </p>
</div>

<script>
function enter() {
  const flash = document.getElementById("flash");

  // start flash
  flash.classList.add("active");

  setTimeout(() => {
    document.getElementById("landing").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.getElementById("stars").style.display = "block";

    // fade flash out
    flash.classList.remove("active");
  }, 600);
}
</script>

</body>
</html>
