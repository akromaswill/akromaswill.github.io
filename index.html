<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, height=device-height">

<style>

/* =========================
   🟣 FULL BACKGROUND (SAFE)
========================= */
html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: -webkit-fill-available;
  background: #6a2a72 !important;
  background-color: #6a2a72 !important;
}

body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  background: #6a2a72 !important;
  background-color: #6a2a72 !important;
}
   body {
  min-height: 100dvh;
}

   body.flash {
  animation: flashAnim 1.2s ease-out;
}

   #landing,
#main {
  background: transparent;
}

#landing {
  transition:
    opacity 1.8s ease,
    transform 1.8s ease;
}

.fade-out {
  opacity: 0;
  transform: scale(1.12);
  filter: brightness(1.6);
}

#heavenGlow {
  position: fixed;
  left: 50%;
  top: 50%;
  width: 120px;
  height: 120px;

  transform: translate(-50%, -50%);
  border-radius: 50%;

  background: white;
  opacity: 0;

  filter: blur(50px);

  pointer-events: none;
  z-index: 100;
}
#heavenGlow.active {
  animation: heavenGlow 1.8s ease-out;
}
   
@keyframes heavenGlow {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.3);
  }

  40% {
    opacity: 0.8;
    transform: translate(-50%, -50%) scale(3);
  }

  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(5);
  }
}
/* ENSURE ALL MAIN SECTIONS FILL SCREEN */

/* =========================
   🧱 LAYOUT
========================= */
.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  height: 100dvh;

  text-align: center;
  padding: 0;
}

.home {
  height: 100%;
}
   
#main {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;

  height: 100dvh;
  width: 100%;

  padding-top: 0px;

  opacity: 0;
  transform: scale(1.05);

  transition:
    opacity 1.2s ease,
    transform 1.2s ease;
}

/* =========================
   🌌 IMAGE
========================= */
#landing img {
  width: 100%;
  max-width: 320px;
  height: auto;
  display: block;
  margin: 0 auto 20px auto;
  transition: filter 1.8s ease;
}
   
.fade-out img {
  filter: brightness(2);
}
   
.title-image {
  width: 100%;
  max-width: 500px;

  display: block;
  margin: -45px auto 0 auto;
}
/* =========================
   💗 ENTER
========================= */
.enter {
  font-size: 22px;
  color: #ff9ae6;
  text-decoration: underline;
  cursor: pointer;
  animation: glow 2s infinite;
}

   .enter:hover {
  transform: scale(1.1);
}

@keyframes glow {
  0% { opacity: 0.6; }
  50% { opacity: 1; text-shadow: 0 0 20px #ff66cc; }
  100% { opacity: 0.6; }
}
   
.menu {
  margin-top: -35px;

  display: flex;
  gap: 35px;

  font-size: 22px;
}

.menu span {
  color: #ff9ae6;
  cursor: pointer;
}

.menu-active {
  animation: glow 2s infinite;
}

a {
  color: #ff9ae6;
  text-decoration: none;
}

a:hover {
  opacity: 0.8;
}

.content-section {
  width: 90%;
  max-width: 500px;

  margin-top: 40px;

  text-align: center;

  color: #ff9ae6;

  font-size: 18px;
  line-height: 1.6;
}
   
/* PROJECT */

.project-image {
  width: 50%;
  max-width: 250px;

  display: block;

  margin: 20px auto 0 auto;
}

.project-title {
  margin-top: 12px;

  color: #ff9ae6;

  font-size: 18px;
}

.project-year {
  margin-top: 0px;

  color: #ff9ae6;

  font-size: 18px;
}
/* =========================
   ⭐ STARS
========================= */
#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 5;
  display: none;
}

.stars {
  position: fixed;
  top: 0;
  bottom: 0;
  width: 32px;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  align-items: center;
  font-size: 26px;
  line-height: 1;
  pointer-events: none;
  z-index: 5;
}

.left {
  left: 0;
}
.right {
  right: 0;
}

/* =========================
   🧿 TEXT
========================= */
h1 {
  color: black;
  font-weight: bold;
  margin: 10px 0;
}

.symbol {
  font-size: 24px;
  color: #ff9ae6;
  margin: 20px 0;
}

p {
  text-align: center;
  line-height: 1.6;
}

</style>
</head>

<body>

<div id="heavenGlow"></div>
   
<div id="bg"></div>

<!-- 🌌 ENTRY -->
<div id="landing" class="center" style="position: relative; z-index: 2;">
  <img src="IMG_7113.png">
  <div class="enter" onclick="enter()">enter heaven</div>
</div>

<!-- 🌐 HOME -->
<div id="main" class="home" style="display:none;">

  <img src="title jerome rafael.png" class="title-image">

 <div class="menu">
  <span id="about-btn" onclick="showSection('about')">about</span>

  <span id="gallery-btn"
        class="menu-active"
        onclick="showSection('gallery')">
        gallery
  </span>

  <span id="contact-btn"
        onclick="showSection('contact')">
        contact
  </span>
</div>


<div id="gallery-content" class="content-section">

  <img src="bookofom.cover.png" class="project-image">

<div class="project-title">
  the book of om
</div>

<div class="project-year">
  (2026)
</div>

</div>

<div id="about-content" class="content-section" style="display:none;">
  <p>
    Jerome Rafael is an artist working across
    photography, publishing, installation and
    digital media.
  </p>
</div>
<div id="contact-content" class="content-section" style="display:none;">
  <p>
    Instagram:<br>

<a href="https://instagram.com/jerome.rafael"
   target="_blank">
   @jerome.rafael
</a>

  </p>
</div>

</div> <!-- END #main -->

<script>

   function showSection(section) {

  document.getElementById("gallery-content").style.display = "none";
  document.getElementById("about-content").style.display = "none";
  document.getElementById("contact-content").style.display = "none";

  document.getElementById("gallery-btn").classList.remove("menu-active");
  document.getElementById("about-btn").classList.remove("menu-active");
  document.getElementById("contact-btn").classList.remove("menu-active");

  document.getElementById(section + "-content").style.display = "block";
  document.getElementById(section + "-btn").classList.add("menu-active");
}
   
function enter() {
  const landing = document.getElementById("landing");
  const main = document.getElementById("main");
  const glow = document.getElementById("heavenGlow");

  document.documentElement.style.background = "#6a2a72";
  document.body.style.background = "#6a2a72";
   
glow.classList.add("active");
   
  landing.classList.add("fade-out");

  setTimeout(() => {
    landing.style.display = "none";

    main.style.display = "flex";

    setTimeout(() => {
      main.style.opacity = "1";
      main.style.transform = "scale(1)";
    }, 50);

}, 1000);
}
</script>
